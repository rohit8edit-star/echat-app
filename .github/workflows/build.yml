name: E-Chat Flutter Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Recreate missing android files
        run: flutter create --project-name eachat . --platforms android

      - name: Restore custom build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }
          android {
              namespace "com.easytoshort.eachat"
              compileSdk 34
              ndkVersion "25.1.8937393"
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_11
                  targetCompatibility JavaVersion.VERSION_11
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions {
                  jvmTarget = '11'
              }
              defaultConfig {
                  applicationId "com.easytoshort.eachat"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
              implementation platform('com.google.firebase:firebase-bom:32.7.0')
              implementation 'com.google.firebase:firebase-messaging'
          }
          EOF

      - run: flutter pub get

      - run: flutter build apk --debug

      - run: flutter build apk --release --no-shrink

      - uses: actions/upload-artifact@v4
        with:
          name: echat-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: echat-release
          path: build/app/outputs/flutter-apk/app-release.apk
