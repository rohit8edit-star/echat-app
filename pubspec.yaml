name: echat
description: E-Chat - Secure Messaging App by EasyToShort
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.1.0

  # Socket.io
  socket_io_client: ^2.0.3+1

  # State Management
  provider: ^6.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.9

  # Local Notifications
  flutter_local_notifications: ^16.2.0

  # WebRTC
  flutter_webrtc: ^0.9.47

  # Image Picker
  image_picker: ^1.0.4

  # UI
  cached_network_image: ^3.3.0
  timeago: ^3.6.0
  intl: ^0.18.1
  cupertino_icons: ^1.0.6

  # Permissions
  permission_handler: ^11.1.0

  # UUID
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
